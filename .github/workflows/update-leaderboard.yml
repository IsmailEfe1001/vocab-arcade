name: Global Arcade Leaderboard Synchronization Engine
on:
  repository_dispatch:
    types: [submit_arcade_score]

permissions:
  contents: write

jobs:
  append-score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize or Load Leaderboard State File
        id: parse-json
        run: |
          if [ ! -f leaderboard.json ]; then
            echo '{}' > leaderboard.json
          fi

      - name: Inject Score Entry Matrix via NodeJS Environment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = context.payload.client_payload;
            
            let fileContent = '{}';
            if (fs.existsSync('leaderboard.json')) {
              fileContent = fs.readFileSync('leaderboard.json', 'utf8');
            }
            
            let database = {};
            try { database = JSON.parse(fileContent); } catch(e) { database = {}; }
            
            const boardKey = payload.board_key;
            if (!database[boardKey]) database[boardKey] = [];
            
            database[boardKey].push({
              initials: payload.initials,
              score: parseInt(payload.score),
              time: parseInt(payload.time),
              timestamp: Date.now()
            });
            
            // Apply logic arrays sorting
            if (boardKey.includes('infinite')) {
              database[boardKey].sort((a, b) => b.score - a.score);
            } else {
              database[boardKey].sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.time - b.time;
              });
            }
            
            // Limit to Top 5 entries
            database[boardKey] = database[boardKey].slice(0, 5);
            
            fs.writeFileSync('leaderboard.json', JSON.stringify(database, null, 2));

      - name: Commit Matrix State Changes and Push
        run: |
          git config --global user.name "Arcade Arena Core"
          git config --global user.email "actions@github.com"
          git add leaderboard.json
          git diff-index --quiet HEAD || (git commit -m "🏆 global leaderboards network stream synchronization update" && git push)
